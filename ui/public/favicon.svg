<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kolb-Bot">
  <defs>
    <linearGradient id="pirate-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4a1d96"/>
    </linearGradient>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#2d1b4e"/>
  <!-- Pirate hat -->
  <path d="M22 48c4-16 20-26 38-26s34 10 38 26H22z" fill="url(#pirate-gradient)"/>
  <!-- Hat brim -->
  <rect x="22" y="48" width="76" height="5" rx="2" fill="url(#gold-gradient)"/>
  <!-- Skull emblem on hat -->
  <circle cx="60" cy="35" r="8" fill="#e8e8e8"/>
  <circle cx="56" cy="33" r="2" fill="#2d1b4e"/>
  <circle cx="64" cy="33" r="2" fill="#2d1b4e"/>
  <path d="M55 39 Q60 42 65 39" stroke="#2d1b4e" stroke-width="1.5" fill="none"/>
  <!-- Crossbones behind skull -->
  <line x1="42" y1="28" x2="78" y2="44" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="28" x2="42" y2="44" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round"/>
  <!-- Face -->
  <circle cx="60" cy="72" r="22" fill="#c8a878"/>
  <!-- Eye patch (left) -->
  <circle cx="50" cy="68" r="8" fill="#1a1a1a"/>
  <line x1="42" y1="62" x2="78" y2="56" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Robotic eye (right) -->
  <circle cx="72" cy="68" r="6" fill="url(#gold-gradient)"/>
  <circle cx="72" cy="68" r="2.5" fill="#ff4444"/>
  <!-- Metal jaw -->
  <rect x="46" y="82" width="28" height="7" rx="3" fill="#999" opacity="0.7"/>
  <path d="M48 86h24" stroke="#777" stroke-width="1"/>
</svg>
